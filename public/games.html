<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseGames</title>
    <style>
        /* --- PURE DARK MODE --- */
        body { margin: 0; padding: 0; background: #000; color: #e0e0e0; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* --- DROPZONE UI --- */
        #dropzone {
            border: 2px dashed #333; border-radius: 16px; padding: 60px 40px; text-align: center;
            cursor: pointer; transition: all 0.2s ease; background: #0a0a0a; width: 80%; max-width: 500px;
        }
        #dropzone:hover, #dropzone.dragover { border-color: #888; background: #151515; transform: scale(1.02); }
        #dropzone h2 { margin: 0; font-size: 20px; font-weight: 500; color: #bbb; pointer-events: none; }
        #fileInput { display: none; }

        /* --- GAME FRAME --- */
        #gameFrame { display: none; width: 100vw; height: 100vh; border: none; position: absolute; top: 0; left: 0; z-index: 10; background: #000; }
        
        /* --- EXIT BUTTON --- */
        #closeBtn {
            display: none; position: absolute; top: 15px; right: 15px; z-index: 20;
            background: rgba(10, 10, 10, 0.7); color: #ccc; border: 1px solid #333;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
            backdrop-filter: blur(5px); transition: 0.2s;
        }
        #closeBtn:hover { background: rgba(20, 20, 20, 0.9); color: #ff6b6b; border-color: #ff6b6b; }
    </style>
</head>
<body>

    <div id="dropzone">
        <h2>Drag or click here to open a HTML file.</h2>
    </div>
    <input type="file" id="fileInput" accept=".html">

    <iframe id="gameFrame"></iframe>
    <button id="closeBtn">Exit Game</button>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const gameFrame = document.getElementById('gameFrame');
        const closeBtn = document.getElementById('closeBtn');

        // --- 1. FILE HANDLING LOGIC ---
        const loadGame = (file) => {
            if (!file || !file.name.endsWith('.html')) {
                alert('Please select a valid .html file!');
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                // Hide Dropzone, Show Game
                dropzone.style.display = 'none';
                gameFrame.style.display = 'block';
                closeBtn.style.display = 'block';
                
                // Inject HTML into iframe
                gameFrame.srcdoc = event.target.result;
            };
            reader.readAsText(file);
        };

        // --- 2. CLICK TO UPLOAD ---
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => loadGame(e.target.files[0]));

        // --- 3. DRAG AND DROP ---
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            loadGame(e.dataTransfer.files[0]);
        });

        // --- 4. GLOBAL DRAG PREVENTION (Keeps browser from accidentally opening the file natively if missed) ---
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());

        // --- 5. EXIT GAME ---
        closeBtn.addEventListener('click', () => {
            gameFrame.srcdoc = ''; // Clear memory
            gameFrame.style.display = 'none';
            closeBtn.style.display = 'none';
            dropzone.style.display = 'block';
            fileInput.value = ''; // Reset file input
        });
    </script>
</body>
</html>
