<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_drive_2022q4.ico">
    <title>My Drive - Google Drive</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; }
        h1 { font-size: 5rem; margin: 0; letter-spacing: -4px; font-weight: 900; }
        input { width: 320px; padding: 18px; border-radius: 14px; border: 1px solid #222; background: #111; color: #fff; margin-bottom: 15px; outline: none; font-size: 16px; }
        button { width: 358px; padding: 18px; border-radius: 14px; border: none; background: #fff; color: #000; font-weight: 700; cursor: pointer; font-size: 16px; }
        #loading { display: none; font-size: 1.5rem; color: #aaa; margin-top: 20px; font-weight: bold; }
        .spinner { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <h1>Base</h1>
        <form id="p">
            <input type="text" id="u" placeholder="Search the web or enter URL..." required autocomplete="off"><br>
            <button type="submit">Launch</button>
        </form>
        <div id="loading"><span class="spinner">⚙️</span> I am Loading your request!</div>
    </div>
    <script>
        document.getElementById('p').addEventListener('submit', e => {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const rawInput = document.getElementById('u').value;
            const target = encodeURIComponent(btoa(rawInput));
            
            document.getElementById('p').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // Check for password in URL, otherwise trust the browser cookies
            let pwParam = urlParams.get('pw') ? '&pw=' + urlParams.get('pw') : '';
            window.location.replace('/?target=' + target + pwParam);
        });
    </script>
</body>
</html>
