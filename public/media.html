<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseMedia</title>
    <style>
        /* --- PURE DARK MODE AESTHETIC --- */
        body { margin: 0; padding: 0; background: #000; color: #e0e0e0; font-family: sans-serif; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        .media-header { background: #0a0a0a; padding: 15px 30px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; }
        .media-header h1 { margin: 0; font-size: 20px; font-weight: bold; color: #fff; letter-spacing: -0.5px; }
        .media-header span { color: #888; margin-left: 15px; font-size: 13px; }
        
        .back-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 13px; display: none; }
        .back-btn:hover { background: #222; color: #fff; border-color: #555; }

        /* --- VIEW 1: MEDIA GRID --- */
        .gallery-view { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; max-width: 1600px; margin: 0 auto; }
        
        .video-card { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .video-card:hover { border-color: #444; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .video-card:hover .play-overlay { opacity: 1; }
        
        .thumbnail-wrapper { position: relative; padding-bottom: 56.25%; background: #111; overflow: hidden; }
        .thumbnail-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0; transition: 0.2s; border: 2px solid #555; }
        
        .video-info { padding: 15px; }
        .video-title { margin: 0; font-size: 14px; color: #ddd; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- VIEW 2: SPLIT SCREEN PLAYER --- */
        .player-view { display: none; flex-grow: 1; overflow: hidden; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; padding: 20px; gap: 20px; }
        
        /* Left Side: Main Video */
        .player-main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .main-video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .main-video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .main-title { margin: 20px 0 0 0; font-size: 20px; color: #fff; line-height: 1.3; }

        /* Right Side: Up Next */
        .player-sidebar { width: 380px; flex-shrink: 0; background: #0a0a0a; border: 1px solid #222; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 15px; font-weight: bold; font-size: 14px; color: #888; border-bottom: 1px solid #222; background: #111; }
        .up-next-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        
        .up-next-item { display: flex; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .up-next-item:hover { background: #151515; border-color: #333; }
        .up-next-thumb { width: 120px; height: 68px; border-radius: 6px; object-fit: cover; background: #222; flex-shrink: 0; }
        .up-next-title { font-size: 13px; color: #ccc; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Scrollbar styling for sidebar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

    <div class="media-header">
        <div class="header-left">
            <h1>🎬 BaseMedia</h1>
            <span>Curated Gallery</span>
        </div>
        <button class="back-btn" id="backBtn" onclick="renderGallery()">← Back to Gallery</button>
    </div>

    <div class="gallery-view" id="galleryView">
        <div class="video-grid" id="mediaGrid"></div>
    </div>

    <div class="player-view" id="playerView">
        <div class="player-main">
            <div class="main-video-wrapper">
                <iframe id="mainPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <h2 class="main-title" id="mainTitle"></h2>
        </div>
        
        <div class="player-sidebar">
            <div class="sidebar-header">Up Next</div>
            <div class="up-next-list" id="upNextList"></div>
        </div>
    </div>

    <script>
        let mediaData = [];

        // Smart parser to extract raw YouTube IDs from various link formats
        const getYouTubeId = (url) => {
            if (url.includes('youtu.be/')) return url.split('youtu.be/')[1].split('?')[0];
            if (url.includes('youtube.com/watch')) return new URLSearchParams(new URL(url).search).get('v');
            return null;
        };

        // Initialize App
        async function loadMedia() {
            try {
                const response = await fetch('media.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                mediaData = await response.json();
                renderGallery();
            } catch (error) {
                // Route error to parent proxy shell
                window.parent.postMessage({ type: 'base_error', log: `BaseMedia Fetch Error: ${error.message}` }, '*');
                document.getElementById('mediaGrid').innerHTML = `<p style="color: #ff5252;">[!] Failed to load media.json</p>`;
            }
        }

        // --- VIEW CONTROLLERS ---

        function renderGallery() {
            // UI Toggle
            document.getElementById('galleryView').style.display = 'block';
            document.getElementById('playerView').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            
            // Destroy active iframe so audio stops playing when returning to gallery
            document.getElementById('mainPlayer').src = '';

            const grid = document.getElementById('mediaGrid');
            grid.innerHTML = '';

            mediaData.forEach(vid => {
                const id = getYouTubeId(vid.url);
                if (!id) return; // Skip invalid links

                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => openPlayer(id);
                
                // Uses YouTube's native high-quality thumbnail endpoint
                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="thumbnail">
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${vid.title}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openPlayer(activeId) {
            // UI Toggle
            document.getElementById('galleryView').style.display = 'none';
            document.getElementById('playerView').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'block';

            const activeVid = mediaData.find(v => getYouTubeId(v.url) === activeId);
            
            // Setup Main Player (Added ?autoplay=1 to auto-start when clicked)
            document.getElementById('mainPlayer').src = `https://www.youtube.com/embed/${activeId}?autoplay=1`;
            document.getElementById('mainTitle').innerText = activeVid.title;

            // Setup 'Up Next' Sidebar
            const sidebar = document.getElementById('upNextList');
            sidebar.innerHTML = '';
            
            // Filter out the video we are currently watching
            const remainingVideos = mediaData.filter(v => getYouTubeId(v.url) !== activeId);
            
            remainingVideos.forEach(vid => {
                const id = getYouTubeId(vid.url);
                const item = document.createElement('div');
                item.className = 'up-next-item';
                item.onclick = () => openPlayer(id); // Clicking re-triggers player setup
                
                item.innerHTML = `
                    <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" class="up-next-thumb">
                    <div class="up-next-title">${vid.title}</div>
                `;
                sidebar.appendChild(item);
            });
        }

        loadMedia();
    </script>
</body>
</html>
